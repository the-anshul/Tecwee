<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Tecwee</title>
  <meta name="description" content="Create a Tecwee client portal account." />
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <picture>
          <source srcset="/assets/images/tecwee_logo.png" media="(prefers-color-scheme: dark)">
          <img src="/assets/images/tecwee_logo_white_bg.png" alt="Tecwee Logo">
        </picture>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="about.html" class="nav-link">Company</a></li>
        <li><a href="pricing.html" class="nav-link">Pricing</a></li>
        <li><a href="services.html" class="nav-link">Services</a></li>
        <li><a href="contact.html" class="nav-link">Contact</a></li>
      </ul>
      <div class="nav-actions"><a href="login.html" class="btn btn-primary">Sign in</a></div>
      <button class="hamburger" id="hamburger" aria-label="Open menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <section class="login-section">
    <div class="login-box reveal">
      <div class="login-logo">Tecwee Client Portal</div>
      <h1 class="login-title">Create account</h1>
      <p class="login-sub">Register for client access. Admin access is enabled separately by Tecwee.</p>
      <form class="login-form" id="registerForm">
        <div class="form-group"><label for="registerEmail">Email address</label><input type="email" id="registerEmail" placeholder="you@company.com" autocomplete="email" required /></div>
        <div class="form-group"><label for="registerPassword">Password</label><input type="password" id="registerPassword" placeholder="Minimum 8 characters" autocomplete="new-password" minlength="8" required /></div>
        <div class="form-group"><label for="registerConfirmPassword">Confirm password</label><input type="password" id="registerConfirmPassword" placeholder="Repeat password" autocomplete="new-password" minlength="8" required /></div>
        <button type="submit" class="btn btn-primary" style="width:100%;min-height:50px;margin-top:8px;">Create account</button>
      </form>
      <p class="login-footer">Already registered? <a href="login.html">Sign in</a></p>
    </div>
  </section>

  <script src="/assets/js/animations.js"></script>
  <script src="/assets/js/main.js"></script>
</body>
</html>
