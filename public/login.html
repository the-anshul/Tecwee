<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | Tecwee</title>
  <meta name="description" content="Sign in to the Tecwee client portal." />
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <picture>
          <source srcset="/assets/images/tecwee_logo.png" media="(prefers-color-scheme: dark)">
          <img src="/assets/images/tecwee_logo_white_bg.png" alt="Tecwee Logo">
        </picture>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="about.html" class="nav-link">Company</a></li>
        <li><a href="pricing.html" class="nav-link">Pricing</a></li>
        <li><a href="services.html" class="nav-link">Services</a></li>
        <li><a href="contact.html" class="nav-link">Contact</a></li>
      </ul>
      <div class="nav-actions"><a href="login.html" class="btn btn-primary">Sign in</a></div>
      <button class="hamburger" id="hamburger" aria-label="Open menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <section class="login-section">
    <div class="login-box reveal">
      <div class="login-logo">Tecwee Client Portal</div>
      <h1 class="login-title">Welcome back</h1>
      <p class="login-sub">Sign in to manage support tickets, services and account details.</p>
      <form class="login-form" id="loginForm">
        <div class="form-group"><label for="loginEmail">Email address</label><input type="email" id="loginEmail" placeholder="you@company.com" required /></div>
        <div class="form-group"><label for="loginPassword">Password</label><input type="password" id="loginPassword" placeholder="Password" required /></div>
        <button type="submit" class="btn btn-primary" style="width:100%;min-height:50px;margin-top:8px;">Sign in</button>
      </form>
      <p class="login-footer">No account yet? <a href="register.html">Create one</a></p>
      <p class="login-footer login-footer-note">Need admin access? Register first, then ask Tecwee to enable admin role.</p>
    </div>
  </section>

  <script src="/assets/js/animations.js"></script>
  <script src="/assets/js/main.js"></script>
</body>
</html>
