<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | Tecwee</title>
  <meta name="description" content="Sign in to your Tecwee client portal to manage your IT support tickets and services." />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Tecwee</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="about.html" class="nav-link">About</a></li>
        <li><a href="services.html" class="nav-link">Services</a></li>
        <li><a href="contact.html" class="nav-link">Contact</a></li>
      </ul>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-primary">Sign in</a>
      </div>
      <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    </div>
  </nav>

  <section class="login-section">
    <div class="login-box reveal">
      <div class="login-logo">Tecwee</div>
      <h1 class="login-title">Welcome back</h1>
      <p class="login-sub">Sign in to your client portal to manage support tickets and services.</p>
      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email address</label>
          <input type="email" id="loginEmail" placeholder="you@company.com" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:14px; margin-top:8px;">
          Sign in
        </button>
      </form>
      <p class="login-footer">Don't have an account? <a href="contact.html">Contact us</a></p>
    </div>
  </section>

  <script src="/main.js"></script>
</body>
</html>
